<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vectomera Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script type="module" crossorigin src="/assets/index-BBPovFy3.js"></script>
  <link rel="stylesheet" crossorigin href="/assets/index-Dd0Ia6eO.css">
</head>
<body>
    <div class="dashboard">
        <aside class="sidebar">
            <div class="logo">
                <h2><span>Vectomera</span> AI</h2>
            </div>
            <nav class="menu">
                <a href="#" class="menu-item active" data-view="ai-agent">
                    <span class="icon">🤖</span>
                    AI Ajan
                </a>
                <a href="#" class="menu-item" data-view="products">
                    <span class="icon">📦</span>
                    Ürünler
                </a>
                <a href="#" class="menu-item" data-view="reviews">
                    <span class="icon">⭐</span>
                    Ürün Yorumları
                </a>
                <a href="#" class="menu-item" data-view="warehouse">
                    <span class="icon">🏢</span>
                    Depo - Ürün
                </a>
            </nav>
        </aside>
        
        <main class="main-content">
            <!-- View containers -->
            <div id="ai-agent-view" class="view active"></div>
            <div id="products-view" class="view"></div>
            <div id="product-detail-view" class="view"></div>
            <div id="reviews-view" class="view"></div>
            <div id="warehouse-view" class="view"></div>
        </main>
    </div>

    <!-- Product Create Modal -->
    <div id="create-product-modal" class="modal">
        <div class="modal-content">
            <span class="modal-close" id="close-create-modal">&times;</span>
            <h2>Yeni Ürün Ekle</h2>
            <form id="create-product-form">
                <div class="form-group">
                    <label for="create-name">Ürün Adı *</label>
                    <input type="text" id="create-name" required />
                </div>
                <div class="form-group">
                    <label for="create-sku">SKU *</label>
                    <input type="text" id="create-sku" required />
                </div>
                <div class="form-group">
                    <label for="create-brand">Marka *</label>
                    <select id="create-brand" required>
                        <option value="">Seçiniz...</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="create-category">Kategori *</label>
                    <select id="create-category" required>
                        <option value="">Seçiniz...</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="create-description">Açıklama</label>
                    <textarea id="create-description" rows="3"></textarea>
                </div>
                <div class="form-group">
                    <label for="create-searchtext">Arama Anahtar Kelimeleri</label>
                    <input type="text" id="create-searchtext" placeholder="virgülle ayırın..." />
                </div>
                <button type="submit" class="btn btn-primary">Kaydet</button>
            </form>
        </div>
    </div>

    <!-- Product Edit Modal -->
    <div id="edit-product-modal" class="modal">
        <div class="modal-content">
            <span class="modal-close" id="close-edit-modal">&times;</span>
            <h2>Ürünü Düzenle</h2>
            <form id="edit-product-form">
                <input type="hidden" id="edit-id" />
                <div class="form-group">
                    <label for="edit-name">Ürün Adı *</label>
                    <input type="text" id="edit-name" required />
                </div>
                <div class="form-group">
                    <label for="edit-sku">SKU *</label>
                    <input type="text" id="edit-sku" required />
                </div>
                <div class="form-group">
                    <label for="edit-description">Açıklama</label>
                    <textarea id="edit-description" rows="3"></textarea>
                </div>
                <div class="form-group">
                    <label for="edit-searchtext">Arama Anahtar Kelimeleri</label>
                    <input type="text" id="edit-searchtext" placeholder="virgülle ayırın..." />
                </div>
                <button type="submit" class="btn btn-primary">Güncelle</button>
            </form>
        </div>
    </div>

</body>
</html>
